name: 📊 Update README Graphs

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-3d:
    uses: ./.github/workflows/3d-contrib.yml
    secrets: inherit

  generate-lego:
    needs: generate-3d
    uses: ./.github/workflows/lego-contribution-garden.yml
    secrets: inherit