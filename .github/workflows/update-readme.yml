name: 🚀 Update README Graphs

on:
  push:
    branches:
      - main
  schedule:
    # GitHub Actions cron uses UTC. 15:00 UTC = 00:00 KST.
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-3d:
    uses: ./.github/workflows/3d-contrib.yml
    secrets: inherit

  generate-lego:
    needs: generate-3d
    uses: ./.github/workflows/lego-contribution-garden.yml
    secrets: inherit

  generate-streak-stats:
    needs: generate-3d
    uses: ./.github/workflows/streak-stats.yml
    secrets: inherit
